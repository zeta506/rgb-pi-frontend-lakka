[cfg]
; Special
fst_boot = false
lang_selected = true
os_name = RGB-Pi on Lakka
os_ver = 4
os_int_ver = 27
os_date_ver = 20240101
scr_date_ver = 20240101
default_theme = Mega Tech
adv_mode = user
; Scraper
scr_hostname = notset
scr_username = notset
scr_password = notset
user_scrap = off
; Main
kiosk_mode = off
kiosk_pwd = 1234
; Screen
dynares = superx
crt_type = generic_15
ui_rotation = no_rotation
screensaver = slide_show
screensaver_time = 1_min
native_csync = off
overscan = off
show_fps = on
flicker_reduction = off
lgun_color_rep = off
force_arcade_60 = off
; EQ
preset = Flat
clipping = 80
31hz = 65
63hz = 65
125hz = 65
250hz = 65
500hz = 65
1khz = 65
2khz = 65
4khz = 65
8khz = 65
16khz = 65
; Sound
system_vol = 80
system_music_vol = 30
system_sounds_vol = 100
system_music = on
system_sounds = on
music_title = on
playlist = Mega Tech
audio_jack = off
; Controls
button_style = snes
menu_toggle = start_select
lgun_min_x = 150
lgun_min_y = 5
lgun_max_x = 712
lgun_max_y = 245
; Online
nick = PLAYER
input_latency = 2
cheevos = off
cheevos_all = off
leaderboards = off
cheevos_pwd = -
youtube_stream_key = MyYTURL
twitch_stream_key = MyTWURL
; Network
wifi = off
wifi_ssid = -
wifi_pwd = -
wifi_country = 'GB'
; Disk
data_source = sd
nfsa = serverA:shareA
nfsb = serverB:shareB
; System
language = en
list_mode = folder_list
show_kodi = on
show_recents = on
theme = Mega Tech
show_hotkey = on
retroarch_menu = on
retroarch_notif = on
scrap_region = usa
overclock = off
fan = off
; Emulation
nes_color = default
sgb_color = DMG Green
stereo = off
sms_sound = off
psx_control = digital
free_play = off
user_remaps = off
core_region = AUTO
keyb_mouse = off
ntsc_filter = off
inputlag_fix = standard
slowdown_fix = off

[path]
; Lakka-port: paths anchored to /storage/rgbpi + Lakka overlay mounts
media_sd         = /storage/roms
media_usb1       = /var/media
media_usb2       = /var/media
media_nfsl       = /storage/nfs-local
media_nfsg       = /storage/nfs-global
retroarch        = /usr/bin/retroarch
cores            = /usr/lib/libretro
udev_rules       = /storage/.config/udev.rules.d/10-local.rules
wpa_supplicant   = /storage/.cache/connman
retroarch_fonts  = /storage/rgbpi/raassets/fonts
retroarch_assets = /storage/rgbpi/raassets
autoconfig       = /storage/rgbpi/data/joyconfig
kodi             = /usr/lib/kodi
rgbpi            = /storage/rgbpi
rgbpi_logs       = /storage/rgbpi/logs
rgbpi_temp       = /storage/rgbpi/temp
rgbpi_data       = /storage/rgbpi/data
rgbpi_backup     = /storage/rgbpi/data/backup
rgbpi_dsp        = /storage/rgbpi/data/dsp_filters
rgbpi_eq         = /storage/rgbpi/data/eq_presets
rgbpi_remaps     = /storage/rgbpi/data/remaps
rgbpi_scraper    = /storage/rgbpi/data/scraper
rgbpi_themes     = /storage/rgbpi/themes
rgbpi_images     = /storage/rgbpi/images
rgbpi_sounds     = /storage/rgbpi/sounds
rgbpi_music      = /storage/rgbpi/sounds/music
rgbpi_sfx        = /storage/rgbpi/sounds/fx

[url]
; Lakka-port: OTA endpoints disabled; utils.sys_update early-returns.
downloads   = disabled.local/downloads
webservices = disabled.local/webservices

[loggers]
keys=root

[logger_root]
; level = CRITICAL > ERROR > WARNING > INFO > DEBUG > NOTSET
level=CRITICAL
handlers=screen,file

[handlers]
keys=screen,file

[handler_screen]
class=StreamHandler
formatter=simple
level=CRITICAL
args=(sys.stdout,)

[handler_file]
class=handlers.TimedRotatingFileHandler
interval=midnight
backupCount=5
formatter=complex
level=CRITICAL
args=('logs/rtk.log',)

[formatters]
keys=simple,complex

[formatter_simple]
format=%(asctime)s, %(levelname)s, %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_complex]
format=%(asctime)s, %(levelname)s, Module %(module)s, Line %(lineno)d, %(message)s
datefmt=%Y-%m-%d %H:%M:%S
