# Default environment for /storage/rgbpi/env.conf, sourced by
# rgbpi-frontend.service. Override per-install by editing the file on
# /storage. Match the values to the active DPI mode in /flash/config.txt.

# 240p superx (default for the 3840x240 NTSC preset)
RGBPI_FB_WIDTH=3840
RGBPI_FB_HEIGHT=240
RGBPI_UI_WIDTH=3840
RGBPI_UI_HEIGHT=240
RGBPI_UI_X=0
RGBPI_UI_Y=0
RGBPI_FB_MAX_FPS=60

# 480i superx alternative (uncomment + comment the 240p block above):
# RGBPI_FB_WIDTH=3840
# RGBPI_FB_HEIGHT=480
# RGBPI_UI_WIDTH=3840
# RGBPI_UI_HEIGHT=480
# RGBPI_UI_X=0
# RGBPI_UI_Y=0
