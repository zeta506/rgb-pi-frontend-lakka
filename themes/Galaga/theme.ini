[bg]
; Background
; type = static, ani_gif, scroll_left, scroll_right, scroll_up, scroll_down, parallax_left, parallax_right, parallax_up, parallax_down
type = ani_gif
; speed value depends on the type value
;   type static   -> speed = none
;   type ani_gif  -> speed = default, milliseconds (i.e. 100)
;   type scroll   -> speed = px/s (i.e. 16)
;   type parallax -> speed = px/s list. 30 values for horizontal and 20 for vertical mode [i.e (96,96,32,16,etc...) ]
speed = default

[fg]
; Foreground
display = false
; send foreground below text objects
sent_back = true

[tran]
; Screen transition
x = 0
y = 0
