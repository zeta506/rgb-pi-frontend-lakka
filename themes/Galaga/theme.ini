[pal]
; Color palette
; Official 16 color palette based on Pico8
; d=dark, l=light, m=medium, der=darker, dst=darkest
black = (0,0,0)
d_blue = (29,43,83)
d_purple = (126,37,83)
d_green = (0,135,81)
brown = (171,82,54)
d_grey = (95,87,79)
l_grey = (194,195,199)
white = (255,241,232)
red = (255,0,77)
orange = (255,163,0)
yellow = (255,236,39)
green = (0,228,54)
blue = (41,173,255)
lavender = (131,118,156)
pink = (255,119,168)
l_peach = (255,204,170)
; Unofficial 16 extra color palette based on Pico8
dst_brown = (41,24,20)
der_blue = (17,29,53)
der_purple = (66,33,54)
blue_green = (18,83,89)
d_brown = (116,47,41)
der_grey = (73,51,59)
m_grey = (162,136,121)
l_yellow = (243,239,125)
d_red = (190,18,80)
d_orange = (255,108,36)
l_green = (168,231,46)
m_green = (0,181,67)
m_blue = (6,90,181)
mauve = (117,70,101)
d_peach = (255,110,89)
peach = (255,157,129)
; color_key = auto, color
;   auto       -> takes the color from the image pixel (0,0)
;   color name -> i.e. green
;   color rgb  -> (0,0,255)
color_key = (0,255,0)

