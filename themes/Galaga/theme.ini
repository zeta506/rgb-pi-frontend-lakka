[cust_sprt]
name =          enemy,         player
; supported types are RtkSprite and RtkAniSprite
type =          RtkAniSprite, RtkAniSprite,   RtkAniSprite,   RtkSprite
position =      (140,48),     (140,180)
position_tate = (80,64),      (100,230)
; angle is the initial value for the vector movement
angle =         0,             0
num_frames =    2,             1
ani_rev_cycle = false,         false
any_speed =     2,             0
; wobble = none, horizontal, vertical
wobble =        horizontal,    horizontal
wobble_speed =  16,            80
wobble_limit =  20,            50
; bounce makes a sprite bounce off the screen limits
bounce =        false,         false
bounce_speed =  0,             0
